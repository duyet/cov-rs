name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run shellcheck
        run: shellcheck cov.sh

  test:
    name: Coverage Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust Stable Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust Nightly Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install rustfilt
        run: cargo install rustfilt || true

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: example

      - name: Install jq (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq

      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: if (-not (Get-Command jq -ErrorAction SilentlyContinue)) { choco install jq -y }

      - name: Code Coverage
        shell: bash
        env:
          GITHUB_PULL_REQUEST: ${{ github.event.pull_request.number }}
          PROJECT_TITLE: "Example build on ${{ matrix.os }}"
        run: |
          cd example
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            bash ../cov.sh
          else
            bash ../cov.sh
          fi

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.os }}
          path: example/target/cov/
          retention-days: 30

  coverage-comment:
    name: Post Coverage Comment
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust Stable Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust Nightly Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install rustfilt
        run: cargo install rustfilt || true

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate and Post Coverage
        env:
          GITHUB_PULL_REQUEST: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_TITLE: "Code Coverage Report"
        run: |
          cd example && bash ../cov.sh
